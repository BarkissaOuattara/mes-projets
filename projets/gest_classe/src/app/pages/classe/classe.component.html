<div class="bg-slate-300 p-4 rounded-lg">
    <p-toast />
    <p-confirmpopup />
<p-table
    [loading]="isWorking()"
    [value]="classeList()"
        stripedRows
        showGridlines
>
<ng-template #caption>
<div class="flex justify-between px-4">
    <div class="text-3xl font-bold">
        Liste des classes
    </div>
        <p-button  (click)="formVisible.set(true)" icon="pi pi-plus" [rounded]="true" severity="info"  />

</div>
</ng-template>
<ng-template #header>
    <tr>
        <th>Nom</th>
        <th></th>
    </tr>
</ng-template>
        <ng-template #body let-classe>
            <tr>
                <td>{{ classe.nom }}</td>
                <td>
                    <div class="flex justify-end gap-4">
                        <p-button (onClick)="updateClasse(classe)" icon="pi pi-pencil" severity="info" />
                        <p-button (onClick)="deleteClasse($event, classe)" icon="pi pi-trash" severity="danger" />
                    </div>

                    
                </td>
            </tr>
        </ng-template>
        </p-table>

    <p-dialog header="Classe" [modal]="true" [(visible)]="formVisible" [style]="{ width: '25rem' }">
        <form (ngSubmit)="submitClassForm()" [formGroup]="classeForm">
            <div class="flex flex-col gap-2">
                <label for="nom" class="font-bold">Nom</label>
                <input pInputText id="nom" aria-describedby="username-help" formControlName="nom" />
                <small id="nom">Entrez le nom de la classe</small>
            </div>
            <div class="flex justify-end gap-2">
                <p-button label="Annuler" severity="secondary" (click)="closeForm()" />
                <p-button type="submit" label="Enregistrer" severity="info" [disabled]="classeForm.invalid" />
            </div>
        </form>
    </p-dialog>

    <p-dialog header="Chargement" [modal]="true" [(visible)]="isWorking" [style]="{ width: '25rem' }">
        <p-progress-spinner strokeWidth="8" fill="transparent" animationDuration=".5s" [style]="{ width: '50px', height: '50px' }" />
    </p-dialog>

</div>
