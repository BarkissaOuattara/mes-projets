<div class="bg-slate-300 p-4 border-2 rounded-lg">
    <p-toast />
    <p-confirmpopup />
    <p-table
        [value]="classeList()"
        stripedRows
        showGridlines
        >
        <ng-template #caption>
            <div class="flex justify-between px-4">
                <div class="text-3xl font-bold">
                    Liste des classe
                </div>
                <p-button (click)="formVisible.set(true)" icon="pi pi-plus" severity="success" />
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th>Nom</th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template #body let-classe>
            <tr>
                <td>{{ classe.nom }}</td>
                <td>
                    <div class="flex justify-end gap-4">
                        <p-button (onClick)="updateClasse(classe)" icon="pi pi-pencil" severity="info" />
                        <p-button (onClick)="deleteClasse($event, classe)" icon="pi pi-trash" severity="danger" />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>

    <p-dialog header="Classe" [modal]="true" [(visible)]="formVisible" [style]="{ width: '25rem' }">
        <form (ngSubmit)="submitClassForm()" [formGroup]="classeForm">
            <div class="flex flex-col gap-2">
                <label for="nom" class="font-bold">Nom</label>
                <input pInputText id="nom" aria-describedby="username-help" formControlName="nom" />
                <small id="nom">Entrez le nom de la classe</small>
            </div>
            <div class="flex justify-end gap-2">
                <p-button label="Annuler" severity="secondary" (click)="closeForm()" />
                <p-button type="submit" label="Enregistrer" [disabled]="classeForm.invalid" />
            </div>
        </form>
    </p-dialog>

</div>
