<!-- Carte contenant le titre et la barre de recherche -->
<div class="card">
  <div class="flex justify-between items-center mb-4">
    <h4 class="m-0" class="text-5xl">Historique des actions</h4>
      <p-iconfield>
        
      <p-inputicon styleClass="pi pi-search"></p-inputicon>
      <input
        pInputText
        type="text"
        [(ngModel)]="searchQuery"
        (input)="filterLogs()"
        placeholder="Rechercher par action, entité, auteur, objet..."
      />
    </p-iconfield>
  </div>
  </div>

  <!-- Table PrimeNG harmonisée -->
  <p-table
    [value]="filteredLogs"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 20, 30]"
    [loading]="isWorking"
    [rowHover]="true"
    dataKey="dateTime"
    [tableStyle]="{ 'min-width': '60rem' }"
    currentPageReportTemplate="Affichage de {first} à {last} sur {totalRecords} actions"
    [showCurrentPageReport]="true"
    [responsiveLayout]="'scroll'"
  >
    <ng-template pTemplate="header">
      <tr class="text-2xl">
        <th style="min-width: 12rem">Date</th>
        <th style="min-width: 10rem">Action</th>
        <th style="min-width: 10rem">Entité</th>
        <th style="min-width: 10rem">Auteur</th>
        <th style="min-width: 10rem">Objet</th>
        <th style="min-width: 18rem">Message</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-log>
      <tr>
        <td>{{ log.dateTime | date: 'dd/MM/yyyy à hh:mm:ss' }}</td>
        <td>
          <span [ngClass]="getColor(log.logType)">
            {{ log.logType }}
          </span>
        </td>
        <td>{{ log.entityName }}</td>
        <td>{{ log.authorCode }}</td>
        <td>{{ log.codeObject }}</td>
        <td>{{ log.message }}</td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center text-gray-500 italic">Aucun log trouvé pour cette recherche.</td>
      </tr>
    </ng-template>
  </p-table>
