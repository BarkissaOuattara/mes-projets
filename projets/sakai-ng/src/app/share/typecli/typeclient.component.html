<p-toast></p-toast>

<div class="card">
  <div class="flex justify-between items-center mb-4">
    <h4 class="text-5xl">Gestion des Type Clients</h4>
    <p-button
      label="Ajouter un type de client"
      icon="pi pi-plus"
      class="mr-2"
            (onClick)="formVisible.set(true)"
    ></p-button>
  </div>
</div>
  

 <p-table
            [value]="typeClientList()"
            [rows]="10"
            [loading]="isWorking()"
            [paginator]="true"
            [tableStyle]="{ 'min-width': '75rem' }"
            [rowHover]="true"
            dataKey="code"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} tarifs"
            [showCurrentPageReport]="true"
            [rowsPerPageOptions]="[10, 20, 30]">


          <ng-template pTemplate="caption">
    <div class="flex items-center justify-between">
      <h5 class="m-0" class="text-3xl">Liste de type client</h5>
      <p-iconfield>
  <p-inputicon styleClass="pi pi-search"></p-inputicon>
  <input pInputText type="text" placeholder="Search..." [(ngModel)]="rechercheLibelle" (ngModelChange)="onSearchChange($event)" />
</p-iconfield>

<div *ngIf="typeClientTrouve">
<p>Type client trouvé : {{ typeClientTrouve.libelle}}</p>
</div>
<div *ngIf="rechercheLibelle && !typeClientTrouve">
  <p style="color:red;">Aucun type client trouvé.</p>
</div>

    </div>
  </ng-template>
            <ng-template #header>
                <tr class="text-2xl">
              
                    
                    <th style="min-width: 12rem">Code </th>
                    <th style="min-width: 12rem">Libellé </th>
                    <th style="min-width: 12rem">Actions</th>
                </tr>
            </ng-template>
            <ng-template #body let-typeClient>
                <tr>
                    
              
              <td>{{ typeClient.code }}</td>
              <td>{{ typeClient.libelle }}</td>
                    <td>
                        <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (onClick)="updateTypeClient(typeClient)" />
                        <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (onClick)="deleteTypeClient($event, typeClient)"/>
                    </td>
                </tr>
            </ng-template>
        </p-table>


        <p-dialog header="tarif" [modal]="true" [(visible)]="formVisible" [style]="{ width: '30rem' }">
    <div class="font-bold"> {{ typeClientForm.get('code')?.value }} </div>

    <form (ngSubmit)="submitTypeClientForm()" [formGroup]="typeClientForm">
      <div class="grid grid-cols-2 gap-4">

        <div>
            <label class="font-semibold block mb-1">Libellé</label>
            <input pInputText formControlName="libelle" class="w-full" />
          </div>
        </div>
  
      <div class="flex justify-end gap-3 mt-6">
        <p-button label="Annuler" severity="secondary" (click)="closeForm()" />
        <p-button type="submit" label="Enregistrer" severity="info" [disabled]="typeClientForm.invalid" />
      </div>
    </form>
  </p-dialog>
<p-confirm-dialog></p-confirm-dialog>
